<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="src/css/output.css" rel="stylesheet">
  <link rel="shortcut icon" type="image/png" href="src/assets/images/logo.png" />
  <title>Bookery - Checkout</title>
  <script>
    (function () {
      const saved = localStorage.getItem('bookery-theme');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>

<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-white pt-30">
  <header
    class="fixed inset-x-0 top-0 z-50 mx-auto w-full max-w-screen-lg border border-gray-100 dark:border-gray-700 bg-white/80 dark:bg-gray-900/80 py-3 shadow backdrop-blur-lg md:top-6 md:rounded-3xl lg:max-w-screen-xl">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <a href="index.html" class="flex items-center gap-2">
          <img src="src/assets/images/logo.png" alt="Bookery Logo" class="h-10 w-10 object-contain" />
          <span class="text-2xl font-bold text-green-700 dark:text-green-400"
            style="font-family:'Playfair Display',serif">Bookery</span>
        </a>
        <div class="hidden md:flex items-center gap-8">
          <a href="index.html"
            class="text-gray-600 dark:text-gray-300 hover:text-green-700 dark:hover:text-green-400 font-medium transition-colors">Home</a>
          <a href="listing.html"
            class="text-gray-600 dark:text-gray-300 hover:text-green-700 dark:hover:text-green-400 font-medium transition-colors">Books</a>
          <a href="about.html"
            class="text-gray-600 dark:text-gray-300 hover:text-green-700 dark:hover:text-green-400 font-medium transition-colors">About</a>
          <a href="contact.html"
            class="text-gray-600 dark:text-gray-300 hover:text-green-700 dark:hover:text-green-400 font-medium transition-colors">Contact</a>
        </div>
        <div class="flex items-center gap-3">
          <button id="theme-toggle" title="Toggle dark mode"
            class="text-gray-500 dark:text-gray-400 hover:text-green-700 dark:hover:text-green-400 transition-colors p-1">
            <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
            <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
          </button>
          <a href="login.html"
            class="hidden md:inline-block text-green-700 dark:text-green-400 border border-green-600 dark:border-green-500 px-4 py-1.5 rounded-lg hover:bg-green-50 dark:hover:bg-green-900/30 transition-all font-medium text-sm">Login</a>
          <a href="register.html"
            class="hidden md:inline-block bg-green-600 text-white px-4 py-1.5 rounded-lg hover:bg-green-700 transition-all font-medium text-sm">Register</a>
          <button id="menu-btn" class="md:hidden text-gray-600 dark:text-gray-300">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>
      </div>
    </div>
    <div id="mobile-menu"
      class="hidden md:hidden border-t border-gray-100 dark:border-gray-700 bg-white dark:bg-gray-900 px-4 py-3 space-y-2">
      <a href="index.html" class="block py-2 text-gray-700 dark:text-gray-300">Home</a>
      <a href="listing.html" class="block py-2 text-gray-700 dark:text-gray-300">Books</a>
      <a href="about.html" class="block py-2 text-gray-700 dark:text-gray-300">About</a>
      <a href="contact.html" class="block py-2 text-gray-700 dark:text-gray-300">Contact</a>
      <div class="flex gap-3 pt-2">
        <a href="login.html"
          class="flex-1 text-center border border-green-600 dark:border-green-500 text-green-700 dark:text-green-400 py-2 rounded-lg font-medium text-sm">Login</a>
        <a href="register.html"
          class="flex-1 text-center bg-green-600 text-white py-2 rounded-lg font-medium text-sm">Register</a>
      </div>
    </div>
  </header>

  <main class="bg-[#f5f5f5] dark:bg-gray-900 py-10">
    <div class="w-full max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
      <div id="checkout-wrapper" class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-md border border-gray-200 dark:border-gray-700">
        <form id="checkout-form">
          <h1 class="text-2xl font-bold text-gray-800 dark:text-white mb-4" style="font-family:'Playfair Display',serif">Checkout</h1>

          <!-- Shipping Address -->
          <div class="mb-6">
            <h2 class="text-xl font-semibold text-gray-700 dark:text-white mb-2">Shipping Address</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label for="first_name" class="block text-gray-700 dark:text-white mb-1">First Name</label>
                <input required type="text" id="first_name"
                  class="w-full rounded-lg border border-gray-200 py-2 px-3 dark:bg-gray-700 dark:text-white dark:border-gray-600">
              </div>
              <div>
                <label for="last_name" class="block text-gray-700 dark:text-white mb-1">Last Name</label>
                <input required type="text" id="last_name"
                  class="w-full rounded-lg border border-gray-200 py-2 px-3 dark:bg-gray-700 dark:text-white dark:border-gray-600">
              </div>
            </div>

            <div class="mt-4">
              <label for="address" class="block text-gray-700 dark:text-white mb-1">Address</label>
              <input required type="text" id="address"
                class="w-full rounded-lg border border-gray-200 py-2 px-3 dark:bg-gray-700 dark:text-white dark:border-gray-600">
            </div>

            <div class="mt-4">
              <label for="city" class="block text-gray-700 dark:text-white mb-1">City</label>
              <input required type="text" id="city"
                class="w-full rounded-lg border border-gray-200 py-2 px-3 dark:bg-gray-700 dark:text-white dark:border-gray-600">
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4">
              <div>
                <label for="state" class="block text-gray-700 dark:text-white mb-1">State</label>
                <input required type="text" id="state"
                  class="w-full rounded-lg border border-gray-200 py-2 px-3 dark:bg-gray-700 dark:text-white dark:border-gray-600">
              </div>
              <div>
                <label for="zip" class="block text-gray-700 dark:text-white mb-1">ZIP Code</label>
                <input required type="text" id="zip"
                  class="w-full rounded-lg border border-gray-200 py-2 px-3 dark:bg-gray-700 dark:text-white dark:border-gray-600">
              </div>
            </div>
          </div>

          <!-- Payment Information -->
          <div>
            <h2 class="text-xl font-semibold text-gray-700 dark:text-white mb-2">Payment Information</h2>
            <div class="mt-4">
              <label for="card_number" class="block text-gray-700 dark:text-white mb-1">Card Number</label>
              <input required type="text" id="card_number"
                class="w-full rounded-lg border border-gray-200 py-2 px-3 dark:bg-gray-700 dark:text-white dark:border-gray-600">
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4">
              <div>
                <label for="exp_date" class="block text-gray-700 dark:text-white mb-1">Expiration Date</label>
                <input required type="text" id="exp_date"
                  class="w-full rounded-lg border border-gray-200 py-2 px-3 dark:bg-gray-700 dark:text-white dark:border-gray-600">
              </div>
              <div>
                <label for="cvv" class="block text-gray-700 dark:text-white mb-1">CVV</label>
                <input required type="text" id="cvv"
                  class="w-full rounded-lg border border-gray-200 py-2 px-3 dark:bg-gray-700 dark:text-white dark:border-gray-600">
              </div>
            </div>
          </div>

          <div class="mt-8 pt-6 border-t border-gray-200 dark:border-gray-700">
            <h2 class="text-xl font-semibold text-gray-700 dark:text-white mb-3">Order Summary</h2>
            <div id="checkout-items" class="space-y-3"></div>
            <div class="border-t border-gray-200 dark:border-gray-700 pt-4 mt-4 flex items-center justify-between">
              <span class="font-medium text-gray-700 dark:text-gray-300">Total</span>
              <span id="checkout-total" class="font-bold text-green-700 dark:text-green-400">$0.00</span>
            </div>
          </div>

          <div class="mt-8 flex justify-end">
            <button type="submit"
              class="bg-green-600 text-white px-5 py-2.5 rounded-lg hover:bg-green-700 dark:bg-green-600 dark:hover:bg-green-500 font-semibold transition-colors">Place Order</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script>
    function getCurrentUser() {
      try {
        return JSON.parse(localStorage.getItem('bookery-user') || 'null');
      } catch (error) {
        return null;
      }
    }

    function getUserCartKey() {
      const user = getCurrentUser();
      if (user && user.email) {
        return `bookery-cart-${String(user.email).toLowerCase()}`;
      }
      return 'bookery-cart-guest';
    }

    function getCart() {
      try {
        return JSON.parse(localStorage.getItem(getUserCartKey()) || '[]');
      } catch (error) {
        return [];
      }
    }

    function setCart(items) {
      localStorage.setItem(getUserCartKey(), JSON.stringify(items));
    }

    function getSubtotal() {
      return getCart().reduce(function (sum, item) {
        return sum + Number(item.price || 0) * Number(item.qty || 0);
      }, 0);
    }

    function formatMoney(amount) {
      return `$${Number(amount || 0).toFixed(2)}`;
    }

    function mergeGuestCartAfterLogin() {
      const user = getCurrentUser();
      if (!user || !user.email) return;

      const guestCart = JSON.parse(localStorage.getItem('bookery-cart-guest') || '[]');
      if (!guestCart.length) return;

      const userCart = getCart();
      guestCart.forEach(function (item) {
        const found = userCart.find(function (entry) {
          return entry.id === item.id;
        });
        if (found) {
          found.qty += Number(item.qty || 1);
        } else {
          userCart.push(item);
        }
      });
      setCart(userCart);
      localStorage.removeItem('bookery-cart-guest');
    }

    function updateHeaderByAuthState() {
      const header = document.querySelector('header');
      if (!header) return;

      const desktopNav = header.querySelector('.hidden.md\\:flex.items-center.gap-8');
      if (desktopNav && !desktopNav.querySelector('[data-cart-link]')) {
        const cartLink = document.createElement('a');
        cartLink.href = 'cart.html';
        cartLink.dataset.cartLink = 'desktop';
        cartLink.className = 'text-gray-600 dark:text-gray-300 hover:text-green-700 dark:hover:text-green-400 font-medium transition-colors';
        desktopNav.appendChild(cartLink);
      }

      const mobileMenu = document.getElementById('mobile-menu');
      if (mobileMenu && !mobileMenu.querySelector('[data-cart-link="mobile"]')) {
        const mobileCartLink = document.createElement('a');
        mobileCartLink.href = 'cart.html';
        mobileCartLink.dataset.cartLink = 'mobile';
        mobileCartLink.className = 'block py-2 text-gray-700 dark:text-gray-300';
        const authRow = mobileMenu.querySelector('.flex.gap-3.pt-2');
        if (authRow) {
          mobileMenu.insertBefore(mobileCartLink, authRow);
        } else {
          mobileMenu.appendChild(mobileCartLink);
        }
      }

      const count = getCart().reduce(function (sum, item) {
        return sum + Number(item.qty || 0);
      }, 0);
      header.querySelectorAll('[data-cart-link]').forEach(function (link) {
        link.textContent = count > 0 ? `Cart (${count})` : 'Cart';
      });

      const user = getCurrentUser();
      if (!user) return;

      const firstName = (user.name || user.email || 'User').trim().split(/\s+/)[0];
      header.querySelectorAll('a[href="login.html"]').forEach(function (link) {
        link.href = '#';
        link.textContent = `Hi, ${firstName}`;
        link.addEventListener('click', function (event) {
          event.preventDefault();
        });
      });

      header.querySelectorAll('a[href="register.html"]').forEach(function (link) {
        link.href = '#';
        link.textContent = 'Logout';
        link.addEventListener('click', function (event) {
          event.preventDefault();
          localStorage.removeItem('bookery-user');
          window.location.href = 'index.html';
        });
      });
    }

    function renderCheckout() {
      if (!getCurrentUser()) {
        window.location.href = 'login.html?redirect=checkout.html';
        return;
      }

      const items = getCart();
      const wrapper = document.getElementById('checkout-wrapper');
      const itemContainer = document.getElementById('checkout-items');
      const totalElement = document.getElementById('checkout-total');

      if (!items.length) {
        wrapper.innerHTML = `
          <section class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl p-8 text-center">
            <h1 class="text-2xl font-bold text-gray-800 dark:text-white mb-3" style="font-family:'Playfair Display',serif">Checkout</h1>
            <p class="text-gray-500 dark:text-gray-400 mb-4">Your cart is empty.</p>
            <a href="listing.html" class="inline-block bg-green-600 text-white px-5 py-2.5 rounded-lg hover:bg-green-700 transition-colors">Browse books</a>
          </section>
        `;
        return;
      }

      itemContainer.innerHTML = items.map(function (item) {
        return `
          <div class="flex items-center justify-between gap-3 text-sm">
            <div class="min-w-0">
              <p class="font-medium text-gray-900 dark:text-white truncate">${item.title}</p>
              <p class="text-gray-500 dark:text-gray-400">Qty: ${item.qty}</p>
            </div>
            <span class="font-semibold text-gray-900 dark:text-white">${formatMoney(item.price * item.qty)}</span>
          </div>
        `;
      }).join('');

      totalElement.textContent = formatMoney(getSubtotal());
      updateHeaderByAuthState();
    }

    document.getElementById('checkout-form').addEventListener('submit', function (event) {
      event.preventDefault();
      const user = getCurrentUser();

      localStorage.setItem('bookery-last-order', JSON.stringify({
        userEmail: user ? user.email : '',
        items: getCart(),
        subtotal: getSubtotal(),
        createdAt: new Date().toISOString()
      }));

      setCart([]);
      alert('Order placed successfully!');
      window.location.href = 'index.html';
    });

    document.getElementById('menu-btn').addEventListener('click', function () {
      document.getElementById('mobile-menu').classList.toggle('hidden');
    });
    document.getElementById('theme-toggle').addEventListener('click', function () {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('bookery-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    });

    mergeGuestCartAfterLogin();
    updateHeaderByAuthState();
    renderCheckout();
  </script>
</body>

</html>
