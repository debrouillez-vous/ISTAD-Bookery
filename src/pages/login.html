<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="../css/output.css" rel="stylesheet">
  <link rel="shortcut icon" type="image/png" href="./src/assets/images/logo.png" />
  <title>Bookery - Login</title>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- Detect and sync theme preference -->
  <script>
    (function () {
      const saved = localStorage.getItem('bookery-theme');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>

<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors duration-300">

  <div id="g_id_onload"
    data-client_id="694453164575-ekempbu7i6h9ron39vo21i5998rp141c.apps.googleusercontent.com"
    data-callback="handleCredentialResponse"
    data-auto_prompt="false">
  </div>

  <!-- Navigation bar -->
  <header
    class="fixed inset-x-0 top-0 z-50 mx-auto w-full max-w-screen-lg border border-gray-100 dark:border-gray-700 bg-white/80 dark:bg-gray-900/80 py-3 shadow backdrop-blur-lg md:top-6 md:rounded-3xl lg:max-w-screen-xl">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <a href="index.html" class="flex items-center gap-2">
          <img src="./src/assets/images/logo.png" alt="Bookery Logo" class="h-10 w-10 object-contain" />
          <span class="text-2xl font-bold text-green-700 dark:text-green-400"
            style="font-family:'Playfair Display',serif">Bookery</span>
        </a>
        <div class="flex items-center gap-3">
          <button id="theme-toggle" title="Toggle dark mode"
            class="text-gray-500 dark:text-gray-400 hover:text-green-700 dark:hover:text-green-400 transition-colors p-1">
            <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
            <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
          </button>
          <a href="index.html"
            class="text-sm text-gray-500 dark:text-gray-400 hover:text-green-700 dark:hover:text-green-400 transition-colors flex items-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Back to Home
          </a>
        </div>
      </div>
    </div>
  </header>

  <div class="min-h-screen flex items-center justify-center px-6 pt-36 md:pt-44 pb-12">
    <div class="w-full max-w-md">
      <div
        class="bg-white dark:bg-gray-800 rounded-3xl shadow-sm dark:shadow-gray-900/30 border border-gray-100 dark:border-gray-700 p-8">

        <div class="text-center mb-8">
          <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2"
            style="font-family:'Playfair Display',serif">Welcome Back!</h1>
          <p class="text-gray-500 dark:text-gray-400">Sign in to access your Bookery account</p>
        </div>

        <!-- Alert box -->
        <div id="alert-box" class="hidden mb-4 px-4 py-3 rounded-xl text-sm font-medium"></div>

        <form id="login-form" class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Email Address</label>
            <div class="relative">
              <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
              <input id="email-input" type="email" placeholder="you@example.com"
                class="w-full pl-11 pr-4 py-3 border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 placeholder-gray-400 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent transition-all" />
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Password</label>
            <div class="relative">
              <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
              <input id="password-input" type="password" placeholder="Enter your password"
                class="w-full pl-11 pr-12 py-3 border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 placeholder-gray-400 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent transition-all" />
              <button type="button" id="toggle-password"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
              </button>
            </div>
          </div>

          <div class="flex items-center justify-between">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" class="rounded text-green-600 focus:ring-green-400" />
              <span class="text-sm text-gray-600 dark:text-gray-400">Remember me</span>
            </label>
            <a href="register.html" class="text-sm text-green-600 dark:text-green-400 hover:text-green-800 font-medium">Forgot password?</a>
          </div>

          <button type="submit" id="login-btn"
            class="w-full bg-green-600 text-white py-3.5 rounded-xl font-semibold hover:bg-green-700 transition-all shadow-lg shadow-green-100 dark:shadow-green-900/30 text-sm flex items-center justify-center gap-2">
            Sign In
          </button>
        </form>

        <div class="flex items-center gap-4 my-6">
          <div class="flex-1 h-px bg-gray-100 dark:bg-gray-700"></div>
          <span class="text-xs text-gray-400 font-medium">or continue with</span>
          <div class="flex-1 h-px bg-gray-100 dark:bg-gray-700"></div>
        </div>

        <!-- Google Sign-In Button -->
        <div class="relative w-full h-11 rounded-lg overflow-hidden cursor-pointer">
          <div class="absolute inset-0 flex items-center justify-center gap-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-200 font-medium text-sm pointer-events-none">
            <svg class="w-5 h-5" viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
          </div>
          <div class="absolute inset-0 opacity-0" id="google-signin-btn"></div>
        </div>

      </div>

      <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6">
        Don't have an account?
        <a href="register.html" class="text-green-600 dark:text-green-400 font-semibold hover:text-green-800">Create one free</a>
      </p>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxVvXB3aOUPO0KrdpnSrdaj520S-4CsksU1Bpmm01iitXDX273abCY5btDAHrGsEyE/exec';
    const ALLOWED_REDIRECTS = new Set(['index.html', 'listing.html', 'about.html', 'contact.html', 'cart.html', 'checkout.html']);

    function getPostAuthRedirect() {
      const redirect = (new URLSearchParams(window.location.search).get('redirect') || '').trim();
      return ALLOWED_REDIRECTS.has(redirect) ? redirect : 'index.html';
    }

    function showAlert(message, type = 'error') {
      const box = document.getElementById('alert-box');
      box.textContent = message;
      box.className = type === 'error'
        ? 'mb-4 px-4 py-3 rounded-xl text-sm font-medium bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 border border-red-200 dark:border-red-800'
        : 'mb-4 px-4 py-3 rounded-xl text-sm font-medium bg-green-50 dark:bg-green-900/20 text-green-600 dark:text-green-400 border border-green-200 dark:border-green-800';
    }

    function setLoading(loading) {
      const btn = document.getElementById('login-btn');
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = `
          <svg class="animate-spin h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Signing in...`;
      } else {
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    }

    async function postToSheet(payload) {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });
      return res.json();
    }

    async function handleCredentialResponse(response) {
      const payload = JSON.parse(atob(response.credential.split('.')[1]));
      const user = {
        name: payload.name,
        email: payload.email,
        picture: payload.picture,
        googleId: payload.sub
      };
      try {
        const result = await postToSheet({ action: 'check', email: user.email });
        if (result.registered) {
          localStorage.setItem('bookery-user', JSON.stringify(user));
          showAlert('Login successful! Redirecting...', 'success');
          setTimeout(() => window.location.href = getPostAuthRedirect(), 1000);
        } else {
          showAlert('No account found. Please register first.');
        }
      } catch (err) {
        console.error(err);
        showAlert('Something went wrong. Please try again.');
      }
    }

    document.getElementById('login-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const email = document.getElementById('email-input').value.trim();
      const password = document.getElementById('password-input').value;
      if (!email || !password) { showAlert('Please enter both email and password.'); return; }
      setLoading(true);
      try {
        const result = await postToSheet({ action: 'login', email, password });
        if (result.success) {
          localStorage.setItem('bookery-user', JSON.stringify({
            name: result.user.name,
            email: result.user.email,
            picture: result.user.picture || '',
            googleId: ''
          }));
          showAlert('Login successful! Redirecting...', 'success');
          setTimeout(() => window.location.href = getPostAuthRedirect(), 1000);
        } else {
          showAlert(result.message || 'Invalid email or password.');
        }
      } catch (err) {
        console.error(err);
        showAlert('Something went wrong. Please try again.');
      } finally {
        setLoading(false);
      }
    });

    document.getElementById('toggle-password').addEventListener('click', function () {
      const input = document.getElementById('password-input');
      input.type = input.type === 'password' ? 'text' : 'password';
    });

    window.addEventListener('load', function () {
      if (window.google) {
        google.accounts.id.renderButton(
          document.getElementById('google-signin-btn'),
          { type: 'standard', size: 'large', width: 600, text: 'signin_with', shape: 'rectangular', theme: 'outline' }
        );
      }
    });

    document.getElementById('theme-toggle').addEventListener('click', function () {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('bookery-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    });
  </script>

</body>
</html>
